nelmio_api_doc:
    documentation:
        info:
            title: My App
            description: This is an awesome app!
            version: 1.0.0
    areas: # to filter documented areas
        path_patterns:
            - ^/api(?!/doc$) # Accepts routes under /api except /api/doc
    models:
        names:
            - { alias: CartItemDetailsView, type: App\Service\Order\View\CartItemDetailsView }
            - { alias: CartDetailsView, type: App\Service\Order\View\CartDetailsView }
            - { alias: ProductDetailsView, type: App\Service\Order\View\ProductDetailsView }